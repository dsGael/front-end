<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="script.js"></script>
    <title>Login</title>
</head>
<body>
    <div class="flex flex-col items-center justify-center min-h-screen bg-slate-800 px-4">
        <form id="login-form" class="w-full max-w-sm p-8 bg-white rounded-xl shadow-2xl border-t-[6px] border-indigo-600">
            <h2 class="mb-8 text-2xl font-bold text-center text-[#1f2937] tracking-wider">INICIAR SESIÓN</h2>

            <div class="mb-6">
                <label class="block mb-2 text-sm font-bold text-gray-700" for="email">
                    Usuario
                </label>
                <input
                    class="w-full px-4 py-3 leading-tight text-gray-700 border border-gray-300 rounded focus:outline-none focus:border-indigo-600 focus:ring-1 focus:ring-indigo-600 transition-colors"
                    id="email"
                    type="text"
                    placeholder="Ingresa tu usuario"
                    required
                >
            </div>

            <div class="mb-8">
                <label class="block mb-2 text-sm font-bold text-gray-700" for="password">
                    Contraseña
                </label>
                <input
                    class="w-full px-4 py-3 mb-3 leading-tight text-gray-700 border border-gray-300 rounded focus:outline-none focus:border-indigo-600 focus:ring-1 focus:ring-indigo-600 transition-colors"
                    id="password"
                    type="password"
                    placeholder="Ingresa tu contraseña"
                    required
                >
            </div>

            <p id="login-error" class="text-sm text-red-600 mb-4 hidden"></p>

            <button
                class="w-full px-4 py-3 font-bold text-white bg-indigo-600 rounded hover:bg-indigo-800 focus:outline-none focus:shadow-outline transition-colors duration-300 shadow-md transform active:scale-95"
                type="submit"
            >
                Ingresar
            </button>
        </form>
    </div>
</body>
</html>
